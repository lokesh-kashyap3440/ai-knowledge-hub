services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_knowledge_hub_postgres
    environment:
      POSTGRES_DB: ai_knowledge_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_knowledge_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_knowledge_hub_backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_knowledge_hub
      CHROMA_PERSIST_DIRECTORY: /app/chroma
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_knowledge_hub_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
  chroma_data:
